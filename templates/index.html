<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        .movies {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .movie {
            width: 150px;
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
        select, button {
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🎬 Movie Recommender System</h1>

    <form method="POST">
        <select name="movie">
            {% for movie in movies %}
                <option value="{{ movie }}">{{ movie }}</option>
            {% endfor %}
        </select>
        <br>
        <button type="submit">Recommend</button>
    </form>

    <div class="movies">
        {% for i in range(names|length) %}
            <div class="movie">
                <p>{{ names[i] }}</p>
                <img src="{{ posters[i] }}">
            </div>
        {% endfor %}
    </div>

</body>
</html>
